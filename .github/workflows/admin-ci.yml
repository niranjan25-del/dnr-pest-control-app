# .github/workflows/admin-ci.yml
# React Admin CI: lint → typecheck → build. Path-filtered to admin_dashboard/. The built
# static bundle is uploaded as an artifact for the deploy workflow (S3 + CloudFront).

name: Admin CI

on:
  push:
    branches: [develop, main]
    paths: ['admin_dashboard/**', '.github/workflows/admin-ci.yml']
  pull_request:
    paths: ['admin_dashboard/**', '.github/workflows/admin-ci.yml']

defaults:
  run:
    working-directory: admin_dashboard

concurrency:
  group: admin-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin_dashboard/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build (injects VITE_ env for the target)
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: admin_dashboard/dist

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm audit --omit=dev --audit-level=high
        continue-on-error: true   # report, don't block (tighten once clean)
