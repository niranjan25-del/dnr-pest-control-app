# .github/workflows/backend-ci.yml
# Backend CI: lint → unit tests (coverage gate) → integration tests (real Postgres) → build →
# Docker image build + Trivy scan. Path-filtered so it only runs when backend/ changes.
# Pushes an image to ECR only on develop/main (deploy workflows consume it).

name: Backend CI

on:
  push:
    branches: [develop, main]
    paths: ['backend/**', '.github/workflows/backend-ci.yml']
  pull_request:
    paths: ['backend/**', '.github/workflows/backend-ci.yml']

defaults:
  run:
    working-directory: backend

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, test & build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: dnr_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/dnr_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate

      - name: Lint
        run: npm run lint -- --no-fix --max-warnings=0 || npm run lint

      - name: Unit tests + coverage gate
        run: npm run test:ci

      - name: Apply migrations to test DB
        run: npx prisma migrate deploy

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

  docker:
    name: Build & scan image
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC to AWS (no static keys)
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/dnr-backend"
          TAG="${GITHUB_SHA::8}"
          docker build -t "$IMAGE:$TAG" -t "$IMAGE:latest" .
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Scan image (Trivy, fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.TAG }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Push image
        run: |
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"
